name: Keep Streamlit App Awake

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Visit the app to keep it awake
        continue-on-error: true
        run: |
          curl -sSL --max-redirs 20 --max-time 30 \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36" \
            -o /dev/null -w "HTTP status: %{http_code} | redirects: %{num_redirects}\n" \
            "https://financial-fraud-alert-review.streamlit.app/"
