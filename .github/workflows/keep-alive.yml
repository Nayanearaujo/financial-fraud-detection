name: Keep Streamlit App Awake

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Visit the app to keep it awake
        run: |
          curl -sSL -o /dev/null -w "HTTP status: %{http_code}\n" \
            "https://financial-fraud-alert-review.streamlit.app/"
